<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>나의 대기 순서</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page user-page">
<main class="mobile-shell">
    <section class="status-hero">
        <p class="eyebrow">WAITING STATUS</p>
        <div class="status-badge" th:classappend="| status-${waiting.status.toLowerCase()}|"
             th:text="${waiting.statusLabel}">입장 준비</div>
        <h1 th:text="${waiting.title}">3번째로 대기 중입니다</h1>
        <p class="lead" th:text="${waiting.notice}">앞 순서가 가까워지면 SMS로 알려드립니다.</p>
    </section>

    <section class="ticket-panel">
        <div class="ticket-row" th:if="${waiting.remainingCount != null}">
            <span>남은 순서</span>
            <strong th:text="${waiting.remainingCount}">3</strong>
        </div>
        <div class="ticket-row" th:if="${waiting.remainingCount != null}">
            <span>예상 대기</span>
            <strong th:text="|약 ${waiting.estimatedWaitMinutes}분|">약 9분</strong>
        </div>
        <div class="ticket-row">
            <span>접수 번호</span>
            <strong th:text="|#${waiting.id}|">#1</strong>
        </div>
        <div class="ticket-row">
            <span>휴대폰 번호</span>
            <strong th:text="${waiting.maskedPhoneNumber}">010-****-1234</strong>
        </div>
        <div class="ticket-row">
            <span>등록 시각</span>
            <strong th:text="${#temporals.format(waiting.createdAt, 'HH:mm')}">14:20</strong>
        </div>
    </section>

    <a class="primary-button button-link" th:href="@{/waitings/{id}(id=${waiting.id})}">새로고침</a>
    <form class="cancel-form" th:if="${waiting.cancellable}"
          th:action="@{/waitings/{id}/cancel(id=${waiting.id})}" method="post">
        <button class="danger-button" type="submit">웨이팅 취소</button>
    </form>
    <a class="ghost-link" th:href="@{/}">다시 등록하기</a>
</main>
</body>
</html>
