<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>오다투어 VR 웨이팅 등록</title>
    <link rel="icon" type="image/png" th:href="@{/images/icon.png}" href="/images/icon.png">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page user-page">
<main class="mobile-shell">
    <section class="hero-panel">
        <div class="oda-brand">
            <img th:src="@{/images/icon.png}" src="/images/icon.png" alt="odatour">
            <strong>odatour</strong>
        </div>
        <p class="eyebrow">ODATOUR BOOTH</p>
        <h1>VR 웨이팅 등록</h1>
        <p class="lead">휴대폰 번호를 남겨주시면 입장 순서가 가까워졌을 때 카카오톡으로 알려드립니다.</p>
        <div class="hero-metric">
            <span>
                현재 대기팀
                <strong th:text="|${estimatedWaitTeams}팀|">5팀</strong>
            </span>
            <span>
                예상 대기시간
                <strong th:text="|약 ${estimatedWaitMinutes}분|">약 15분</strong>
            </span>
        </div>
    </section>

    <form class="form-panel" th:action="@{/waitings}" method="post">
        <div class="form-alert" th:if="${errorMessage != null}">
            <strong th:text="${errorMessage}">등록할 수 없습니다.</strong>
            <a th:if="${activeWaitingId != null}"
               th:href="@{/waitings/{id}(id=${activeWaitingId})}">기존 웨이팅 확인</a>
        </div>

        <label class="field">
            <span>휴대폰 번호</span>
            <input type="tel" name="phoneNumber" inputmode="numeric" autocomplete="tel"
                   data-phone-number-input maxlength="13"
                   pattern="010[0-9]{8}|010-[0-9]{4}-[0-9]{4}"
                   title="01012345678 또는 010-1234-5678 형식으로 입력해 주세요."
                   placeholder="010-1234-5678" th:value="${phoneNumber}" required>
        </label>

        <label class="agree-box">
            <input type="checkbox" name="consentAgreed" value="true" required>
            <span>
                개인정보 수집 및 이용에 동의합니다.
                <small>웨이팅 안내 카카오 알림톡 발송 목적으로만 사용됩니다.</small>
            </span>
        </label>

        <button class="primary-button" type="submit">웨이팅 등록하기</button>
    </form>

    <section class="info-strip" aria-label="운영 안내">
        <div>
            <span class="info-label">안내</span>
            <strong>카카오톡 입장안내를 받으신 후 부스 대기줄에서 현장 직원 확인을 받아 주세요.</strong>
        </div>
        <p>번호를 잘못 입력한 경우 관리자에게 말씀해 주세요.</p>
    </section>
</main>
<script>
    document.querySelectorAll('[data-phone-number-input]').forEach((input) => {
        const formatPhoneNumber = (value) => {
            const digits = value.replace(/\D/g, '').slice(0, 11);
            if (digits.length <= 3) {
                return digits;
            }
            if (digits.length <= 7) {
                return `${digits.slice(0, 3)}-${digits.slice(3)}`;
            }
            return `${digits.slice(0, 3)}-${digits.slice(3, 7)}-${digits.slice(7)}`;
        };

        const updateValue = () => {
            input.value = formatPhoneNumber(input.value);
        };

        input.addEventListener('input', updateValue);
        updateValue();
    });
</script>
</body>
</html>
