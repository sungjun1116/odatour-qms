<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>웨이팅 관리자</title>
    <link rel="icon" type="image/png" th:href="@{/images/icon.png}" href="/images/icon.png">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page admin-page">
<main class="admin-shell">
    <header class="admin-header">
        <div>
            <p class="eyebrow">ODATOUR ADMIN</p>
            <h1>웨이팅 관리</h1>
        </div>
        <div class="admin-header-actions">
            <a class="small-button secondary" th:href="@{/admin/waitings/entered}">입장 완료 <span th:text="${enteredCount}">12</span></a>
            <a class="small-button" th:href="@{/admin/waitings}">새로고침</a>
        </div>
    </header>

    <nav class="admin-tabs" aria-label="관리자 목록">
        <a class="tab-link active" th:href="@{/admin/waitings}">처리 대기</a>
        <a class="tab-link" th:href="@{/admin/waitings/entered}">입장 완료</a>
    </nav>

    <section class="summary-grid" aria-label="웨이팅 요약">
        <article class="summary-card">
            <span>처리 대상</span>
            <strong th:text="${summary.total}">14</strong>
        </article>
        <article class="summary-card">
            <span>대기 중</span>
            <strong th:text="${summary.waiting}">9</strong>
        </article>
        <article class="summary-card">
            <span>호출됨</span>
            <strong th:text="${summary.called}">4</strong>
        </article>
        <article class="summary-card">
            <span>현장도착</span>
            <strong th:text="${summary.arrived}">1</strong>
        </article>
        <article class="summary-card">
            <span>페이지</span>
            <strong th:text="${summary.totalPages}">2</strong>
        </article>
    </section>

    <section class="operation-panel" aria-label="호출 운영">
        <div>
            <span>현장 관리 인원</span>
            <strong>
                <span th:text="${boothQueueCount}">3</span>/<span th:text="${boothQueueCapacity}">5</span>
            </strong>
            <small>부족 인원 <b th:text="${callShortageCount}">2</b>명</small>
        </div>
        <form th:action="@{/admin/waitings/notify-shortage}" method="post">
            <button class="small-button" type="submit" th:disabled="${callShortageCount == 0}"
                    onclick="return confirm('부족 인원을 호출 처리할까요?');">
                부족 인원 호출
            </button>
        </form>
    </section>

    <section class="admin-list" aria-label="웨이팅 목록">
        <p class="form-alert success" th:if="${successMessage != null}" th:text="${successMessage}">카카오 알림톡을 발송했습니다.</p>
        <p class="form-alert" th:if="${errorMessage != null}" th:text="${errorMessage}">카카오 알림톡 발송에 실패했습니다.</p>
        <p class="empty-message" th:if="${#lists.isEmpty(waitings)}">현재 처리할 웨이팅이 없습니다.</p>
        <th:block th:each="waiting : ${waitings}">
        <h2 class="list-section-title" th:if="${sectionHeadings[waiting.id] != null}"
            th:text="${sectionHeadings[waiting.id]}">WAITING 고객</h2>
        <article class="waiting-card"
                 th:attr="data-called-at=${waiting.status == 'CALLED' && waiting.notifiedAt != null ? waiting.notifiedAt : null},data-call-overdue=${waiting.callOverdue}">
            <div class="waiting-main">
                <div>
                    <span class="queue-number" th:text="|#${waiting.id}|">#1</span>
                    <strong th:text="${waiting.maskedPhoneNumber}">010-****-4412</strong>
                </div>
                <span class="status-badge" th:classappend="| status-${waiting.status.toLowerCase()}|"
                      th:text="${waiting.statusLabel}">대기 중</span>
            </div>
            <span class="overdue-label" data-overdue-label th:if="${waiting.status == 'CALLED'}"
                  th:classappend="${waiting.callOverdue} ? '' : ' hidden'">호출 후 10분 경과</span>

            <div class="waiting-meta">
                <span>
                    남은 순서
                    <strong th:text="${waiting.remainingCount == null ? '-' : waiting.remainingCount}">0</strong>
                </span>
                <span>
                    등록
                    <strong th:text="${#temporals.format(waiting.createdAt, 'M/d HH:mm')}">5/9 13:42</strong>
                </span>
                <span th:if="${waiting.notifiedAt != null}">
                    호출
                    <strong th:text="${#temporals.format(waiting.notifiedAt, 'M/d HH:mm')}">5/9 13:45</strong>
                </span>
                <span th:if="${waiting.callElapsedLabel != null}">
                    호출 후 경과
                    <strong data-call-elapsed th:text="${waiting.callElapsedLabel}">7분 경과</strong>
                </span>
            </div>

            <div class="admin-actions" th:if="${waiting.actionable}">
                <form th:if="${waiting.notifiable}" th:action="@{/admin/waitings/{id}/notify(id=${waiting.id})}" method="post">
                    <button class="action-button notify" type="submit"
                            onclick="return confirm('이 고객을 호출 처리할까요?');">호출하기</button>
                </form>
                <form th:if="${waiting.arrivable}" th:action="@{/admin/waitings/{id}/arrive(id=${waiting.id})}" method="post">
                    <button class="action-button arrive" type="submit"
                            onclick="return confirm('이 고객을 현장도착 처리할까요?');">현장도착 확인</button>
                </form>
                <form th:if="${waiting.enterable}" th:action="@{/admin/waitings/{id}/enter(id=${waiting.id})}" method="post">
                    <button class="action-button enter" type="submit"
                            onclick="return confirm('이 고객을 입장 완료 처리할까요?');">입장완료</button>
                </form>
                <form th:if="${waiting.noShowable}" th:action="@{/admin/waitings/{id}/no-show(id=${waiting.id})}" method="post">
                    <button class="action-button no-show" type="submit"
                            onclick="return confirm('이 고객을 노쇼 처리할까요?');">노쇼</button>
                </form>
                <form th:if="${waiting.cancelable}" th:action="@{/admin/waitings/{id}/cancel(id=${waiting.id})}" method="post">
                    <button class="action-button cancel" type="submit"
                            onclick="return confirm('정말로 취소하시겠습니까?');">취소처리</button>
                </form>
            </div>
        </article>
        </th:block>
    </section>

    <nav class="pagination" th:if="${page.totalPages > 1}" aria-label="웨이팅 목록 페이지">
        <a class="page-link" th:classappend="${!page.hasPrevious} ? ' disabled'"
           th:href="@{/admin/waitings(page=${page.previousPage})}">이전</a>
        <a class="page-number" th:each="pageNumber : ${page.pageNumbers}"
           th:classappend="${pageNumber == page.currentPage} ? ' active'"
           th:href="@{/admin/waitings(page=${pageNumber})}"
           th:text="${pageNumber}">1</a>
        <a class="page-link" th:classappend="${!page.hasNext} ? ' disabled'"
           th:href="@{/admin/waitings(page=${page.nextPage})}">다음</a>
    </nav>
</main>
<script th:src="@{/js/admin-waitings.js}" defer></script>
</body>
</html>
