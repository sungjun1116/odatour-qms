spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    default: local
  application:
    name: odatour-waiting-system
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./.local-data/odatour-waiting;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:true}
      path: /h2-console
  sql:
    init:
      mode: always

logging:
  level:
    root: INFO
    com.odatour.waiting: INFO

solapi:
  api-key: ${SOLAPI_API_KEY:}
  api-secret-key: ${SOLAPI_API_SECRET_KEY:}
  from: ${SOLAPI_FROM:}
  kakao:
    pf-id: ${SOLAPI_KAKAO_PF_ID:}
    call-template-id: ${SOLAPI_KAKAO_CALL_TEMPLATE_ID:}
    no-show-template-id: ${SOLAPI_KAKAO_NO_SHOW_TEMPLATE_ID:}
    disable-sms: ${SOLAPI_KAKAO_DISABLE_SMS:true}

---
spring:
  config:
    activate:
      on-profile: "!local"

logging:
  structured:
    format:
      console: ${LOGGING_STRUCTURED_FORMAT_CONSOLE:logstash}
