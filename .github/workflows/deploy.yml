name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_IMAGE: odatour-qms:latest
  APP_IMAGE_TAR: odatour-waiting-system-image.tar
  APP_PLATFORM: linux/arm64
  DEPLOY_DIR: /home/ociax/app/odatour-qms
  SSH_PORT: ${{ secrets.OCI_PORT }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Test
        run: ./gradlew test

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ env.APP_PLATFORM }}
          tags: ${{ env.APP_IMAGE }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker image
        run: |
          mkdir -p dist
          docker save "${APP_IMAGE}" -o "dist/${APP_IMAGE_TAR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: odatour-waiting-system-image
          path: dist/${{ env.APP_IMAGE_TAR }}
          if-no-files-found: error

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: odatour-waiting-system-image
          path: dist

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT}" -H "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare deploy directory
        run: |
          ssh -p "${SSH_PORT}" -i ~/.ssh/deploy_key "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" << EOF
            set -e
            mkdir -p "${DEPLOY_DIR}"
          EOF

      - name: Upload compose files and image
        run: |
          scp -P "${SSH_PORT}" -i ~/.ssh/deploy_key \
            docker-compose.yml "dist/${APP_IMAGE_TAR}" \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:${DEPLOY_DIR}/"

      - name: Deploy with Docker Compose
        run: |
          ssh -p "${SSH_PORT}" -i ~/.ssh/deploy_key "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" << EOF
            set -e
            cd "${DEPLOY_DIR}"
            docker load -i "${APP_IMAGE_TAR}"
            APP_IMAGE="${APP_IMAGE}" docker compose up -d --no-build --remove-orphans
            docker compose ps
          EOF
