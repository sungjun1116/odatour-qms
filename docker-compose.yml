services:
  app:
    image: ${APP_IMAGE}
    container_name: odatour-qms-app
    ports:
      - ${APP_PORT}:8080
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ${LOGGING_STRUCTURED_FORMAT_CONSOLE:-logstash}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_H2_CONSOLE_ENABLED: "false"
      SOLAPI_API_KEY: ${SOLAPI_API_KEY}
      SOLAPI_API_SECRET_KEY: ${SOLAPI_API_SECRET_KEY}
      SOLAPI_FROM: ${SOLAPI_FROM}
      SOLAPI_KAKAO_PF_ID: ${SOLAPI_KAKAO_PF_ID}
      SOLAPI_KAKAO_CALL_TEMPLATE_ID: ${SOLAPI_KAKAO_CALL_TEMPLATE_ID}
      SOLAPI_KAKAO_NO_SHOW_TEMPLATE_ID: ${SOLAPI_KAKAO_NO_SHOW_TEMPLATE_ID}
      SOLAPI_KAKAO_DISABLE_SMS: ${SOLAPI_KAKAO_DISABLE_SMS:-true}
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: odatour-qms-db
    ports:
      - "${POSTGRES_BIND}:${POSTGRES_PORT}:5432"
    environment:
      TZ: Asia/Seoul
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

volumes:
  postgres-data:
